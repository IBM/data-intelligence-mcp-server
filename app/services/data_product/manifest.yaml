service:
  name: data_product
  description: "Tools for creating, managing, and publishing data products with comprehensive lifecycle management. This service enables creation of data products from URLs or container assets (catalogs/projects), attachment of business domains and contracts (URL-based or template-based), configuration of delivery methods, and publishing to make data products available for consumption. Supports searching existing data products and managing data contracts throughout the product lifecycle."
system_instructions: |
  Tools for creating, managing, and publishing data products with comprehensive lifecycle management. This service enables creation of data products from URLs or container assets (catalogs/projects), attachment of business domains and contracts (URL-based or template-based), configuration of delivery methods, and publishing to make data products available for consumption. Supports searching existing data products and managing data contracts throughout the product lifecycle.
  
  Data Product Tools:
  1. create_or_update_url_data_product - Use this tool when user wants to create a URL data product or update an existing draft with a URL asset. Note that this tool creates a URL data product draft and should ask user if he wants to attach business domain and contract to the created draft.
  2. create_update_data_product_from_asset_in_container - Use this tool when user wants to create a data product from assets in container or update an existing draft with assets from container. This tool is called after import_remote_assets_to_data_product_catalog tool. Note that this tool creates a data product draft and should ask user if he wants to attach contract and business domain to the created draft.
  3. attach_business_domain_to_data_product - Use this tool to attach business domain to a data product draft. Read the business domain to be attached from the user.
  4. attach_url_contract_to_data_product - Use this tool to attach a url contract to a data product draft. Read the contract details to be attached from the user.
  5. find_data_product_delivery_methods_based_on_connection - Use this tool to find delivery methods available in the catalog based on the connection. This tool lets the user choose from the available delivery methods. If the user does not know the delivery methods available, use this tool to help the user.
  6. add_delivery_methods_to_data_product - Use this tool to add delivery methods to a data product draft. Read the delivery method details from the user. This tool should be called after find_data_product_delivery_methods_based_on_connection tool.
  7. publish_data_product - Use this tool to publish a data product draft. Make sure to call this tool after all the required fields are filled in the data product draft, like name, domain, contract URL, delivery methods, etc.
  8. search_data_products - Use this tool to search all data products to return data products that match the given search query.
  9. get_data_product_details - Use this tool to retrieve comprehensive information about a data product including release details, parts/assets with enriched column schemas, primary keys, and subscription information. Provide either data_product_id or data_product_name.
  10. search_data_product_subscriptions - Use this tool to search and filter data product subscriptions (asset lists). Returns subscription metadata including ID, state, name, and owner. To find subscriptions for a specific data product, use the asset.id from get_data_product_details response (NOT the catalog ID). Query examples: asset.id=="<asset_id>", name=="My data product", state=="succeeded".
  11. get_data_product_subscription_details - Use this tool to retrieve the actual content (items) being delivered in a specific subscription. Requires a subscription_id from search_data_product_subscriptions. Returns detailed delivery information including asset IDs, delivery states, and access information (flight descriptors, URLs).
  12. get_data_product_contract - Use this tool to get data contract for the specified data product (draft/published (available)).
  13. get_data_contract_test_results - Use this tool to get data contract test results for the specified data product (draft/published (available)). Returns contract test details including status, last tested time, test summary, and metadata.
  14. list_data_product_contract_templates - Use this tool to get all data contract templates available in the instance.
  15. attach_contract_template_to_data_product - Use this tool to attach a contract template to a data product draft. Read the contract template name to be attached from the user. This tool receives the template ID from the context. If template ID is not known, use list_data_product_contract_templates to find the template ID.
  16. create_attach_custom_data_product_contract - Use this tool to create and attach a custom contract (not from a template) to a data product draft. Read the contract details from the user.
  17. list_data_product_business_domains - Use this tool to get all business domains defined in the system. You can also search specific domains.
  18. import_remote_assets_to_data_product_catalog - Use this tool to import remote assets into the DPH catalog. This is called as the first tool to create a data product from assets in container.
