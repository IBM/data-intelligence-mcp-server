service:
  name: metadata_enrichment
  description: "Tools for enriching data assets with comprehensive metadata, data quality analysis, and automated profiling. This service helps transform raw data into AI-ready data by adding detailed metadata, quality metrics, and business context to assets within projects."
system_instructions: |
  Tools for enriching data assets with comprehensive metadata, data quality analysis, and automated profiling. This service helps transform raw data into AI-ready data by adding detailed metadata, quality metrics, and business context to assets within projects.
  
  Metadata Enrichment Tools:
  1. create_metadata_enrichment_asset → create a metadata enrichment asset into the project.
  2. execute_metadata_enrichment_asset → execute the metadata enrichment by name in the specified project.
  3. execute_metadata_enrichment_asset_for_selected_assets → execute the metadata enrichment by name in the specified project for the list of specified data assets.
  4. execute_data_quality_analysis_for_selected_assets → execute data quality analysis for selected assets in a project.
  5. execute_metadata_expansion_for_selected_assets → execute metadata expansion for selected assets in a project.
  6. start_metadata_relationship_analysis → start a relationship analysis (primary key, foreign key, or overlap analysis) for a metadata enrichment area in a project.
  7. search_categories → searches all the available categories
  8. term_generation → executes term generation on an existing metadata enrichment asset in a project.
  9. execute_advanced_profiling → execute advanced profiling on a metadata enrichment asset with configurable sampling presets.
